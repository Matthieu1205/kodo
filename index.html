<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODO - Rejoindre un Duo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAF9F6;
            color: #2C3E50;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .logo { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #1B2A4A; }
        p { font-size: 16px; color: #7f8c8d; line-height: 1.5; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            background: #1B2A4A;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover { background: #2c3e6a; }
        .sub { font-size: 13px; color: #bbb; margin-top: 16px; }
    </style>
    <script>
        // Récupérer le paramètre duo de l'URL
        const params = new URLSearchParams(window.location.search);
        const duoId = params.get('duo') || '';

        // Construire le lien Android App Links avec le duo_id
        function getAppLink() {
            if (duoId) {
                return 'intent://invite?duo=' + duoId + '#Intent;scheme=kodo;package=com.example.kodo_flutter;end';
            }
            return 'intent://invite#Intent;scheme=kodo;package=com.example.kodo_flutter;end';
        }

        function openApp() {
            window.location.href = getAppLink();
        }
    </script>
</head>
<body>
    <div class="card">
        <div class="logo">&#x1F48C;</div>
        <h1>KODO</h1>
        <p>Ton partenaire t'invite a rejoindre son duo sur KODO, l'app qui renforce les relations.</p>
        <a href="#" class="btn" onclick="openApp(); return false;">Ouvrir KODO</a>
        <p class="sub">Si l'app ne s'ouvre pas, installe KODO depuis le Play Store.</p>
    </div>
</body>
</html>
