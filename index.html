<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rejoindre KÔDÔ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; text-align: center;
           padding: 60px 24px; background: #F8F5EF; color: #2C2C2C; min-height: 100vh; }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 32px; color: #1A1F3C; font-weight: 700; margin-bottom: 8px; }
    .sub { font-size: 16px; color: #8A8A8A; margin-bottom: 40px; }
    .card { background: white; border-radius: 20px; padding: 28px;
            max-width: 400px; margin: 0 auto 24px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
    .card p { font-size: 16px; color: #2C2C2C; line-height: 1.5; margin-bottom: 16px; }
    .btn { display: inline-block; background: #1A1F3C; color: white;
           padding: 16px 32px; border-radius: 16px; text-decoration: none;
           font-size: 16px; font-weight: 700; cursor: pointer; border: none; }
    .note { font-size: 13px; color: #8A8A8A; margin-top: 24px; line-height: 1.6; }
    .gold { color: #C9A84C; }
    #msg { font-size: 13px; color: #C9A84C; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="logo">✨</div>
  <h1>KÔDÔ</h1>
  <p class="sub">L'app qui renforce votre relation</p>

  <div class="card">
    <p>Ton partenaire t'invite à rejoindre son duo sur <strong class="gold">KÔDÔ</strong>.</p>
    <button class="btn" onclick="openApp()">Rejoindre le duo 💛</button>
    <p id="msg">Si l'app ne s'ouvre pas, assure-toi qu'elle est bien installée.</p>
  </div>

  <p class="note">
    Tu n'as pas encore KÔDÔ ?<br>
    Installe-la d'abord, puis reviens ici.
  </p>

  <script>
    function openApp() {
      window.location = 'kodo://invite';
      setTimeout(function() {
        document.getElementById('msg').style.display = 'block';
      }, 2000);
    }
  </script>
</body>
</html>
